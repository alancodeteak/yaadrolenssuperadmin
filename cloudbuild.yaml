substitutions:
  _GCS_BUCKET: yaadro-lens-lens-dev-superadmin-web

steps:
  - id: install
    name: node:20
    entrypoint: npm
    args: ['ci']

  - id: build
    name: node:20
    entrypoint: npm
    args: ['run', 'build', '--', '--base=/superadmin/']

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        DEST="gs://${_GCS_BUCKET}/superadmin"

        if [ -d dist/assets ]; then
          gsutil -m rsync -r -d dist/assets "${DEST}/assets/"
        fi

        for file in dist/*; do
          [ -f "${file}" ] || continue
          name="$(basename "${file}")"
          [ "${name}" = "index.html" ] && continue
          gsutil cp "${file}" "${DEST}/${name}"
        done

        gsutil -h "Cache-Control:no-cache, max-age=0" \
          -h "Content-Type:text/html" \
          cp dist/index.html "${DEST}/index.html"

options:
  logging: CLOUD_LOGGING_ONLY

timeout: 1200s
